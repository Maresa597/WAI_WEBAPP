<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>User Dashboard - WAI</title>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a class="logo-wrap" href="/user/dashboard.html">
    <img src="/img/wai-logo-transparent.png" alt="WAI Logo">
    <span class="brand-title">User Dashboard</span>
  </a>

  <div class="nav-links">
    <a href="/user/dashboard.html">Dashboard</a>
    <a href="/user/history.html">History</a>
    <a href="/user/services.html">Services</a>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>
</nav>


<main class="page">
  <div class="page-header">
    <h1 id="welcome">Welcome</h1>
    <p id="address">Loading address...</p>
  </div>

  <section class="grid grid-4">
    <div class="stat-card">
      <h3>Water level</h3>
      <div class="value" id="waterLevel">0%</div>
      <p id="waterLiters">0 L</p>
    </div>

    <div class="stat-card orange">
      <h3>Battery</h3>
      <div class="value" id="batteryLevel">0%</div>
      <p id="energyWh">0 Wh</p>
    </div>

    <div class="stat-card">
      <h3>Tank status</h3>
      <div id="tankStatus"></div>
    </div>

    <div class="stat-card orange">
      <h3>System status</h3>
      <div id="systemStatus"></div>
    </div>
  </section>

  <section class="page-header" style="margin-top:28px;">
    <h1>Latest notifications</h1>
  </section>

  <div class="table-wrap">
    <table>
      <thead>
      <tr>
        <th>Title</th>
        <th>Message</th>
        <th>Type</th>
        <th>Date</th>
      </tr>
      </thead>
      <tbody id="notifications"></tbody>
    </table>
  </div>
</main>


<footer class="footer">
  WAI - Water Adaptive Intelligence | Smart Water For A Resilient Suriname
</footer>

<script src="/js/app.js"></script>
<script src="/js/user.js"></script>
</body>
</html>
