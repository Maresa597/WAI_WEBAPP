<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - WAI</title>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a class="logo-wrap" href="/">
    <img src="/img/wai-logo-transparent.png" alt="WAI Logo">
    <span class="brand-title">WAI WebApp</span>
  </a>

  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/auth/login.html" class="btn-soft">Login</a>
    <a href="/auth/register.html" class="btn-primary">Register</a>
  </div>
</nav>


  <main class="page form-container">
    <div class="card">
      <img
        src="/img/wai-logo.png"
        alt="WAI Logo"
        style="max-height:110px; display:block; margin:auto;"
      >

      <h1>Login</h1>

      <p>
        Demo user: use an existing database email with password
        <strong>demo123</strong>.
      </p>

      <p>
        Admin:
        <strong>admin@wai.local</strong> /
        <strong>admin123</strong>
      </p>

      <form id="loginForm">
        <label>Email</label>
        <input
          type="email"
          id="email"
          required
          placeholder="caleb.mohan@example.com"
        >

        <label>Password</label>
        <input
          type="password"
          id="password"
          required
          placeholder="demo123"
        >

        <button class="btn btn-primary" type="submit">
          Login
        </button>
      </form>

      <div id="loginMessage" class="message"></div>
    </div>
  </main>


  <footer class="footer">
    WAI - Water Adaptive Intelligence | Smart Water For A Resilient Suriname
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
