<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Users - WAI</title>

  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="logo-wrap" href="dashboard.html">
    <img src="../img/wai-logo-transparent.png" alt="WAI Logo">
    <span class="brand-title">Owner section</span>
  </a>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="users.html">Users</a>
    <a href="requests.html">Requests</a>
    <button class="btn btn-danger" onclick="logout()">Log out</button>
  </div>

</nav>

<main class="page">

  <div class="page-header">
    <h2>Manage Users</h2>
  </div>

  <div class="card" style="margin-bottom:20px;">

    <div class="toolbar">

      <div>
        <label for="userSearch">Search User by Name</label>
        <input
                type="text"
                id="userSearch"
                placeholder="For example Maresa, Caleb..."
        >
      </div>

      <div>
        <label for="districtFilter">Filter District</label>
        <select id="districtFilter">
          <option value="all">All Districts</option>
          <option value="Paramaribo">Paramaribo</option>
          <option value="Wanica">Wanica</option>
        </select>
      </div>

      <div>
        <label for="statusFilter">Filter Status</label>
        <select id="statusFilter">
          <option value="all">All Statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

    </div>

  </div>

  <div class="table-wrap">
    <table>

      <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>District</th>
        <th>Address</th>
        <th>Status</th>
      </tr>
      </thead>

      <tbody id="usersTable">
      </tbody>

    </table>
  </div>
</main>

<script src="../js/app.js"></script>

<script src="../js/admin.js"></script>

</body>
</html>
