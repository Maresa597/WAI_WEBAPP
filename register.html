<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register - WAI</title>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a class="logo-wrap" href="/">
    <img src="/img/wai-logo-transparent.png" alt="WAI Logo">
    <span class="brand-title">WAI WebApp</span>
  </a>

  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/auth/login.html" class="btn-soft">Login</a>
    <a href="/auth/register.html" class="btn-primary">Register</a>
  </div>
</nav>


  <main class="page form-container">
    <div class="card">
      <h1>Register</h1>

      <form id="registerForm">
        <label>Full name</label>
        <input type="text" id="full_name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Phone</label>
        <input type="text" id="phone">

        <label>Password</label>
        <input type="password" id="password" required>

        <button class="btn btn-primary" type="submit">
          Create account
        </button>
      </form>

      <div id="registerMessage" class="message"></div>
    </div>
  </main>


  <footer class="footer">
    WAI - Water Adaptive Intelligence | Smart Water For A Resilient Suriname
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
